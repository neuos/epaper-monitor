substitutions:
  name: e1001
  friendly_name: "reTerminal E1001"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    - priority: 600
      then:
        - output.turn_on: bsp_sd_enable
        - output.turn_on: bsp_battery_enable
        - delay: 200ms
        - component.update: battery_voltage
        - component.update: battery_level
        - light.turn_on: onboard_led

esp32:
  board: seeed_xiao_esp32s3
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  hardware_uart: UART0 # Required to report logs over USB on this device

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
      bssid: !secret wifi_bssid
      manual_ip:
        static_ip: !secret wifi_static_ip
        gateway: !secret wifi_gateway
        subnet: !secret wifi_subnet
        dns1: !secret wifi_dns1
        dns2: !secret wifi_dns2
  fast_connect: true
  on_connect:
    - script.execute: handle_wakeup
    - script.execute: reset_sleep_timer

deep_sleep:
  id: deep_sleep_1
  wakeup_pin: GPIO3
  wakeup_pin_mode: INVERT_WAKEUP

spi:
  clk_pin: GPIO7
  mosi_pin: GPIO9
i2c:
  scl: GPIO20
  sda: GPIO19

globals:
  - id: sleep_timer_seconds
    type: int
    restore_value: false
    initial_value: "0"
  - id: is_loading
    type: bool
    restore_value: false
    initial_value: "false"
  - id: battery_glyph
    type: std::string
    restore_value: false
    initial_value: "\"\\U000F0079\""

sensor:
  - platform: sht4x
    temperature:
      name: "Temperature"
      id: temp_sensor
    humidity:
      name: "Relative Humidity"
      id: hum_sensor
    update_interval: 90s
  - platform: adc
    pin: GPIO1
    name: "Battery Voltage"
    id: battery_voltage
    update_interval: 90s
    attenuation: 12db
    filters:
      - multiply: 2.0
    on_value:
      then:
        - component.update: battery_level
  - platform: template
    name: "Battery Level"
    id: battery_level
    unit_of_measurement: "%"
    icon: "mdi:battery"
    device_class: battery
    state_class: measurement
    lambda: "return id(battery_voltage).state;"
    update_interval: never
    on_value:
      then:
        - lambda: |-
            int pct = int(x);
            if (pct <= 10)      id(battery_glyph) = "\U000F007A";
            else if (pct <= 20) id(battery_glyph) = "\U000F007B";
            else if (pct <= 30) id(battery_glyph) = "\U000F007C";
            else if (pct <= 40) id(battery_glyph) = "\U000F007D";
            else if (pct <= 50) id(battery_glyph) = "\U000F007E";
            else if (pct <= 60) id(battery_glyph) = "\U000F007F";
            else if (pct <= 70) id(battery_glyph) = "\U000F0080";
            else if (pct <= 80) id(battery_glyph) = "\U000F0081";
            else if (pct <= 90) id(battery_glyph) = "\U000F0082";
            else                id(battery_glyph) = "\U000F0079";
    filters:
      - calibrate_linear:
          - 4.15 -> 100.0
          - 3.96 -> 90.0
          - 3.91 -> 80.0
          - 3.85 -> 70.0
          - 3.80 -> 60.0
          - 3.75 -> 50.0
          - 3.68 -> 40.0
          - 3.58 -> 30.0
          - 3.49 -> 20.0
          - 3.41 -> 10.0
          - 3.30 -> 5.0
          - 3.27 -> 0.0
      - clamp:
          min_value: 0
          max_value: 100

output:
  - platform: gpio
    pin: GPIO6
    id: bsp_led
    inverted: true
  - platform: gpio
    pin: GPIO16
    id: bsp_sd_enable
  - platform: gpio
    pin: GPIO21
    id: bsp_battery_enable

light:
  - platform: binary
    name: "Onboard LED"
    output: bsp_led
    id: onboard_led
    internal: true

time:
  - platform: homeassistant
    id: homeassistant_time
    timezone: "Europe/Vienna"

text_sensor:
  - platform: version
    hide_timestamp: true
    name: "${friendly_name} ESPHome Version"
    entity_category: diagnostic
  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP Address"
      icon: mdi:wifi
      entity_category: diagnostic
      id: sensorip
    ssid:
      name: "${friendly_name} Connected SSID"
      icon: mdi:wifi-strength-2
      entity_category: diagnostic
      id: sensorssid

interval:
  - interval: 1s
    then:
      - lambda: |-
          id(sleep_timer_seconds)++;
          if (id(sleep_timer_seconds) % 30 == 0) {
            ESP_LOGI("sleep_timer", "Timer at %d seconds", id(sleep_timer_seconds));
          }
          if (id(sleep_timer_seconds) >= 90) {
            ESP_LOGI("sleep_timer", "90 seconds elapsed, checking time and entering sleep");
            id(check_time_and_sleep).execute();
          }

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO4
      mode: INPUT_PULLUP
      inverted: true
    id: right
    name: "Right"
    internal: true
    on_press:
      then:
        - script.execute: reset_sleep_timer
        - script.execute: refresh_departures

  - platform: gpio
    pin:
      number: GPIO5
      mode: INPUT_PULLUP
      inverted: true
    id: left
    name: "Left"
    internal: true
    on_press:
      then:
        - script.execute: reset_sleep_timer
        - script.execute: refresh_departures

http_request:
  verify_ssl: false
  timeout: 10s
  watchdog_timeout: 15s

script:
  - id: reset_sleep_timer
    mode: queued
    then:
      - lambda: |-
          ESP_LOGI("sleep_timer", "Timer reset to 0");
          id(sleep_timer_seconds) = 0;

  - id: handle_wakeup
    mode: single
    then:
      - lambda: |-
          auto wakeup_cause = esp_sleep_get_wakeup_cause();
          ESP_LOGI("wakeup", "Wakeup cause: %d (0=undefined, 2=ext0/GPIO, 4=timer)", wakeup_cause);
      - script.execute: refresh_departures

  - id: refresh_departures
    mode: single
    then:
      - lambda: |-
          id(is_loading) = true;
      - component.update: epaper_display
      - lambda: |-
          ESP_LOGI("refresh", "Updating dashboard_image_departures");
          id(dashboard_image_departures).update();

  - id: check_time_and_sleep
    mode: single
    then:
      - lambda: |-
          auto time = id(homeassistant_time).now();
          if (!time.is_valid()) {
            ESP_LOGW("sleep_script", "Time not available, sleeping for 30 minutes");
            id(onboard_led).turn_off();
            id(deep_sleep_1).set_sleep_duration(30 * 60 * 1000);
            id(deep_sleep_1).begin_sleep();
            return;
          }

          int hour = time.hour;
          int minute = time.minute;
          ESP_LOGI("sleep_script", "Current time: %02d:%02d", hour, minute);

          if (hour >= 22 || hour < 6) {
            ESP_LOGI("sleep_script", "Night time (22:00-06:00), sleeping until 6am");
          }
      - if:
          condition:
            lambda: |-
              auto time = id(homeassistant_time).now();
              int hour = time.hour;
              return (hour >= 22 || hour < 6);
          then:
            - lambda: |-
                auto time = id(homeassistant_time).now();
                int hour = time.hour;
                int minute = time.minute;

                int minutes_until_6am;
                if (hour >= 22) {
                  minutes_until_6am = ((24 - hour) * 60 - minute) + (6 * 60);
                } else {
                  minutes_until_6am = (6 - hour) * 60 - minute;
                }

                ESP_LOGI("sleep_script", "Sleeping for %d minutes until 6am", minutes_until_6am);
                id(onboard_led).turn_off();
                id(deep_sleep_1).set_sleep_duration(minutes_until_6am * 60 * 1000);
                id(deep_sleep_1).begin_sleep();
          else:
            - lambda: |-
                ESP_LOGI("sleep_script", "Day time (06:00-22:00), sleeping for 60 minutes");
                id(onboard_led).turn_off();
                id(deep_sleep_1).set_sleep_duration(60 * 60 * 1000);
                id(deep_sleep_1).begin_sleep();

online_image:
  - id: dashboard_image_departures
    format: PNG
    type: BINARY
    url: https://screenshot.oracle.neuhuber.eu/screenshot?width=800&height=480&delay_ms=0&bw=true&wait_for=%5Bdata-ready%5D&url=https%3A%2F%2Foebb.oracle.neuhuber.eu%2Fmulti.html%3Fstations%3D1290501%2C0905026%2C1390563%26num_journeys%3D10%26additional_time%3D5%26total%3D10%26update_interval%3D30%26font_color%3Dffffff%26background_color%3D000000%26show_clock%3Dtrue%26show_header%3Dtrue
    update_interval: never
    on_download_finished:
      - lambda: |-
          id(is_loading) = false;
      - delay: 100ms
      - component.update: epaper_display

font:
  - file: "gfonts://Inter@700"
    id: font_inter
    size: 24
  - file: "gfonts://Arimo"
    id: font_status
    size: 18
    glyphs: "0123456789.°C "
  - file: "fonts/materialdesignicons-webfont.ttf"
    id: font_bat_icon
    size: 24
    glyphs:
      - "\U000F007A" # mdi-battery-10
      - "\U000F007B" # mdi-battery-20
      - "\U000F007C" # mdi-battery-30
      - "\U000F007D" # mdi-battery-40
      - "\U000F007E" # mdi-battery-50
      - "\U000F007F" # mdi-battery-60
      - "\U000F0080" # mdi-battery-70
      - "\U000F0081" # mdi-battery-80
      - "\U000F0082" # mdi-battery-90
      - "\U000F0079" # mdi-battery (full)

display:
  - platform: waveshare_epaper
    id: epaper_display
    model: 7.50inV2p
    full_update_every: 2
    cs_pin: GPIO10
    dc_pin: GPIO11
    reset_pin:
      number: GPIO12
      inverted: false
    busy_pin:
      number: GPIO13
      inverted: true
    update_interval: never
    lambda: |-
      it.image(0, 0, id(dashboard_image_departures));
      // Status overlay: battery icon then temperature in top left
      it.filled_rectangle(0, 0, 120, 26, COLOR_OFF);
      it.printf(2, 1, id(font_bat_icon), COLOR_ON, TextAlign::TOP_LEFT, "%s", id(battery_glyph).c_str());
      if (id(temp_sensor).has_state()) {
        it.printf(28, 4, id(font_status), COLOR_ON, TextAlign::TOP_LEFT, "%.1f°C", id(temp_sensor).state);
      }
      if (id(is_loading)) {
        it.filled_rectangle(300, 0, 200, 32, COLOR_OFF);
        it.print(400, 4, id(font_inter), COLOR_ON, TextAlign::TOP_CENTER, "Loading...");
      }
